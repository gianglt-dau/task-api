services:
  gh-runner:
    image: myoung34/github-runner:latest
    container_name: gh-runner-task-api
    restart: unless-stopped
    environment:
      REPO_URL: https://github.com/gianglt-dau/task-api
      RUNNER_NAME: wsl-runner-task-api
      RUNNER_SCOPE: repo
      LABELS: wsl,docker,task-api
      RUNNER_WORKDIR: /tmp/runner/work
      RUNNER_TOKEN: REPLACE_WITH_RUNNER_TOKEN
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./runner-data:/runner
    privileged: true